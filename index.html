<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>85 Collective</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #fff; color: #111; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }
    .card .ov { opacity: 0; transition: opacity .2s; }
    .card:hover .ov { opacity: 1; }
    .card .ti { transition: transform .4s ease; }
    .card:hover .ti { transform: scale(1.05); }
    .nb:hover { color: #111 !important; }
    .btn-w:hover { background: #333 !important; }
    .btn-l:hover { background: #f5f5f5 !important; }
    .wbtn:hover { background: rgba(255,255,255,.15) !important; }
    .pl-tab:hover { color: #111 !important; }
    .prog-bar { cursor: pointer; }
    .prog-bar:hover .prog-fill { background: #555 !important; }
    .prog-bar:hover .prog-dot { opacity: 1 !important; }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { height: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="yt-player-container" style="position:fixed;top:-9999px;left:0;width:1px;height:1px;overflow:hidden;">
    <div id="yt-player"></div>
  </div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ── YOUR CONFIG ──────────────────────────────────────────────────
    const API_KEY        = "AIzaSyCzTFNBhEJJXsWo8TMPlDUQkEEaw5cRAGs";
    const CHANNEL_HANDLE = "@85collective";
    const CHANNEL_URL    = "https://www.youtube.com/@85collective";
    // ─────────────────────────────────────────────────────────────────

    const YT_API = "https://www.googleapis.com/youtube/v3";

    const fmt = s => {
      if (!s || isNaN(s)) return "0:00";
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
      return h > 0 ? `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}` : `${m}:${String(sec).padStart(2,"0")}`;
    };

    async function fetchChannel() {
      const r = await fetch(`${YT_API}/channels?part=contentDetails,id&forHandle=${CHANNEL_HANDLE}&key=${API_KEY}`);
      const d = await r.json();
      if (!d.items?.length) throw new Error("Channel not found");
      return { channelId: d.items[0].id, uploadsId: d.items[0].contentDetails.relatedPlaylists.uploads };
    }

    async function fetchAllVideos(uploadsId) {
      let videos = [], pageToken = "";
      do {
        const r = await fetch(`${YT_API}/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=50${pageToken ? "&pageToken="+pageToken : ""}&key=${API_KEY}`);
        const d = await r.json();
        if (d.error) throw new Error(d.error.message);
        videos = videos.concat(d.items || []);
        pageToken = d.nextPageToken || "";
      } while (pageToken);
      return videos.map((item, i) => {
        const s = item.snippet;
        return { id: s.resourceId.videoId, num: String(videos.length - i).padStart(3,"0"), title: s.title,
          date: new Date(s.publishedAt).toLocaleDateString("en-GB", { month:"short", year:"numeric" }),
          thumb: s.thumbnails?.maxres?.url || s.thumbnails?.high?.url || "" };
      });
    }

    async function fetchPlaylists(channelId) {
      let playlists = [], pageToken = "";
      do {
        const r = await fetch(`${YT_API}/playlists?part=snippet&channelId=${channelId}&maxResults=50${pageToken ? "&pageToken="+pageToken : ""}&key=${API_KEY}`);
        const d = await r.json();
        playlists = playlists.concat(d.items || []);
        pageToken = d.nextPageToken || "";
      } while (pageToken);
      return playlists.map(p => ({ id: p.id, title: p.snippet.title }));
    }

    async function fetchPlaylistVideoIds(playlistId) {
      let ids = [], pageToken = "";
      do {
        const r = await fetch(`${YT_API}/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50${pageToken ? "&pageToken="+pageToken : ""}&key=${API_KEY}`);
        const d = await r.json();
        (d.items || []).forEach(it => ids.push(it.snippet.resourceId.videoId));
        pageToken = d.nextPageToken || "";
      } while (pageToken);
      return new Set(ids);
    }

    // ── Thumbnail ────────────────────────────────────────────────────
    function Thumb({ url, id, alt }) {
      const [err, setErr] = useState(false);
      const src = url || `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
      return err
        ? <div style={{ width:"100%", height:"100%", background:"linear-gradient(145deg,#181818,#2e2e2e)" }} />
        : <img src={src} alt={alt||""} onError={() => setErr(true)} style={{ width:"100%", height:"100%", display:"block", objectFit:"cover" }} />;
    }

    // ── Episode card ─────────────────────────────────────────────────
    function EpCard({ ep, onWatch, onAudio, isActive, isPlaying }) {
      return (
        <div className="card">
          <div style={{ aspectRatio:"16/9", overflow:"hidden", background:"#f0f0f0", marginBottom:16, position:"relative" }}>
            <div className="ti" style={{ width:"100%", height:"100%" }}><Thumb url={ep.thumb} id={ep.id} alt={ep.title} /></div>
            <div className="ov" style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.55)", display:"flex", alignItems:"center", justifyContent:"center", gap:10 }}>
              <button className="wbtn" onClick={() => onWatch(ep)} style={{ color:"#fff", fontSize:11, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", padding:"8px 16px", border:"1px solid rgba(255,255,255,.35)", background:"transparent" }}>Watch</button>
              <button className="wbtn" onClick={() => onAudio(ep)} style={{ color:"#fff", fontSize:11, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", padding:"8px 16px", border:"1px solid rgba(255,255,255,.35)", background:"transparent" }}>{isPlaying ? "⏸" : "♪ Audio"}</button>
            </div>
          </div>
          <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:5 }}>
            <span style={{ fontSize:9, fontWeight:700, color:"#ccc", letterSpacing:"0.12em", textTransform:"uppercase", flexShrink:0 }}>EP {ep.num}</span>
            <span style={{ fontSize:14, fontWeight:700, lineHeight:1.3 }}>{ep.title}</span>
          </div>
          <p style={{ fontSize:11, color:"#bbb", marginBottom:10 }}>{ep.date}</p>
          <div style={{ display:"flex", gap:14 }}>
            <button onClick={() => onWatch(ep)} style={{ fontSize:11, fontWeight:700, color:"#888", letterSpacing:"0.06em", textTransform:"uppercase", borderBottom:"1px solid #ddd", paddingBottom:1 }}>Watch</button>
            <button onClick={() => onAudio(ep)} style={{ fontSize:11, fontWeight:700, letterSpacing:"0.06em", textTransform:"uppercase", paddingBottom:1, borderBottom:`1px solid ${isActive?"#111":"#ddd"}`, color:isActive?"#111":"#888" }}>{isPlaying ? "⏸ Pause" : "♪ Listen"}</button>
          </div>
        </div>
      );
    }

    // ── About ────────────────────────────────────────────────────────
    function About() {
      return (
        <div style={{ maxWidth:580 }}>
          <p style={{ fontSize:10, fontWeight:700, letterSpacing:"0.22em", textTransform:"uppercase", color:"#bbb", marginBottom:24 }}>About</p>
          <h1 style={{ fontSize:46, fontWeight:900, letterSpacing:"-0.04em", lineHeight:1.08, marginBottom:48 }}>A platform for<br/>local electronic music.</h1>
          <div style={{ borderTop:"1px solid #ebebeb", paddingTop:40 }}>
            {["85 Collective is a monthly radio show dedicated to amplifying the voices of local electronic artists. Each episode is a curated journey through the underground — mixes, live sets, and original productions from artists who deserve to be heard.",
              "We believe local scenes are the lifeblood of electronic music. Our mission is simple: give those scenes a platform, remove the barriers, and let the music speak.",
              "New episodes drop every month. If you're a local artist and want to be featured, reach out."
            ].map((t, i) => <p key={i} style={{ fontSize:16, lineHeight:1.85, color:"#444", marginBottom: i < 2 ? 24 : 48 }}>{t}</p>)}
          </div>
          <div style={{ borderTop:"1px solid #ebebeb", paddingTop:32 }}>
            <p style={{ fontSize:10, fontWeight:700, letterSpacing:"0.22em", textTransform:"uppercase", color:"#bbb", marginBottom:20 }}>Find Us</p>
            <a href={CHANNEL_URL} target="_blank" rel="noopener noreferrer" style={{ fontSize:14, fontWeight:700, letterSpacing:"0.04em", borderBottom:"1px solid #111", paddingBottom:2, display:"inline-block" }}>YouTube ↗</a>
          </div>
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────
    function App() {
      const [view,        setView]        = useState("episodes");
      const [allVideos,   setAllVideos]   = useState([]);
      const [playlists,   setPlaylists]   = useState([]);
      const [activePl,    setActivePl]    = useState(null); // null = All
      const [plCache,     setPlCache]     = useState({});   // playlistId -> Set of videoIds
      const [plLoading,   setPlLoading]   = useState(false);
      const [loading,     setLoading]     = useState(true);
      const [error,       setError]       = useState(null);
      const [watchEp,     setWatchEp]     = useState(null);
      const [audioEp,     setAudioEp]     = useState(null);
      const [playing,     setPlaying]     = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration,    setDuration]    = useState(0);
      const [ytReady,     setYtReady]     = useState(false);
      const playerRef  = useRef(null);
      const pollRef    = useRef(null);
      const pendingRef = useRef(null); // video to load once API ready

      // Wait for YT IFrame API
      useEffect(() => {
        if (window.YT && window.YT.Player) { setYtReady(true); return; }
        window.onYouTubeIframeAPIReady = () => setYtReady(true);
      }, []);

      // Load channel data
      useEffect(() => {
        (async () => {
          try {
            const { channelId, uploadsId } = await fetchChannel();
            const [videos, pls] = await Promise.all([fetchAllVideos(uploadsId), fetchPlaylists(channelId)]);
            setAllVideos(videos);
            setPlaylists(pls);
          } catch(e) { setError(e.message); }
          finally { setLoading(false); }
        })();
      }, []);

      // Polling for progress
      const startPoll = useCallback(() => {
        clearInterval(pollRef.current);
        pollRef.current = setInterval(() => {
          const p = playerRef.current;
          if (!p || typeof p.getCurrentTime !== "function") return;
          try { setCurrentTime(p.getCurrentTime()); setDuration(p.getDuration()); } catch(_) {}
        }, 400);
      }, []);

      const stopPoll = useCallback(() => clearInterval(pollRef.current), []);

      // Create or reuse YT player
      const loadAudio = useCallback((ep) => {
        setAudioEp(ep); setCurrentTime(0); setDuration(0); setPlaying(true);
        if (!ytReady) { pendingRef.current = ep; return; }
        if (playerRef.current && typeof playerRef.current.loadVideoById === "function") {
          playerRef.current.loadVideoById(ep.id);
          startPoll();
          return;
        }
        playerRef.current = new window.YT.Player("yt-player", {
          videoId: ep.id,
          playerVars: { autoplay: 1, controls: 0, playsinline: 1 },
          events: {
            onReady: () => { startPoll(); },
            onStateChange: (e) => {
              const S = window.YT.PlayerState;
              setPlaying(e.data === S.PLAYING);
              if (e.data === S.PLAYING) startPoll();
              else stopPoll();
            }
          }
        });
      }, [ytReady, startPoll, stopPoll]);

      // If API becomes ready while a video was pending
      useEffect(() => {
        if (ytReady && pendingRef.current) { loadAudio(pendingRef.current); pendingRef.current = null; }
      }, [ytReady, loadAudio]);

      const togglePlay = () => {
        const p = playerRef.current;
        if (!p) return;
        playing ? p.pauseVideo() : p.playVideo();
      };

      const stopAudio = () => {
        stopPoll();
        try { playerRef.current?.stopVideo(); } catch(_) {}
        setAudioEp(null); setPlaying(false); setCurrentTime(0); setDuration(0);
      };

      const handleAudio = ep => {
        if (audioEp?.id === ep.id) togglePlay();
        else loadAudio(ep);
      };

      const handleSeek = (e) => {
        if (!duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        const t    = pct * duration;
        try { playerRef.current?.seekTo(t, true); } catch(_) {}
        setCurrentTime(t);
      };

      // Playlist tab click
      const handlePlTab = async (plId) => {
        setActivePl(plId);
        if (!plId || plCache[plId]) return;
        setPlLoading(true);
        try {
          const ids = await fetchPlaylistVideoIds(plId);
          setPlCache(c => ({ ...c, [plId]: ids }));
        } catch(_) {}
        setPlLoading(false);
      };

      // Filtered videos
      const visibleVideos = activePl
        ? allVideos.filter(v => plCache[activePl]?.has(v.id))
        : allVideos;

      const latest   = allVideos[0];
      const progress = duration ? currentTime / duration : 0;

      return (
        <div style={{ minHeight:"100vh", background:"#fff", color:"#111", paddingBottom: audioEp ? 80 : 0 }}>

          {/* HEADER */}
          <header style={{ position:"sticky", top:0, zIndex:100, background:"rgba(255,255,255,.96)", backdropFilter:"blur(12px)", borderBottom:"1px solid #ebebeb", height:64, padding:"0 40px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <button onClick={() => setView("episodes")} style={{ fontWeight:800, fontSize:13, letterSpacing:"0.22em", textTransform:"uppercase" }}>85 Collective</button>
            <nav style={{ display:"flex", gap:28, fontSize:11, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", alignItems:"center" }}>
              {["episodes","about"].map(v => (
                <button key={v} className="nb" onClick={() => setView(v)} style={{ color:view===v?"#111":"#bbb", paddingBottom:2, borderBottom:view===v?"1.5px solid #111":"1.5px solid transparent" }}>{v}</button>
              ))}
              <a href={CHANNEL_URL} target="_blank" rel="noopener noreferrer" className="nb" style={{ color:"#bbb" }}>YouTube ↗</a>
            </nav>
          </header>

          {/* MAIN */}
          <main style={{ maxWidth:1080, margin:"0 auto", padding:"60px 40px" }}>
            {view === "about" && <About />}

            {view === "episodes" && <>
              {loading && (
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:300, gap:16 }}>
                  <div style={{ width:32, height:32, border:"2px solid #ebebeb", borderTopColor:"#111", borderRadius:"50%", animation:"spin 0.7s linear infinite" }} />
                  <p style={{ fontSize:12, color:"#bbb", letterSpacing:"0.1em", textTransform:"uppercase" }}>Loading episodes…</p>
                </div>
              )}

              {error && (
                <div style={{ maxWidth:480, margin:"80px auto", textAlign:"center" }}>
                  <p style={{ fontSize:10, color:"#bbb", letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:12 }}>Could not load episodes</p>
                  <p style={{ fontSize:14, color:"#888" }}>{error}</p>
                </div>
              )}

              {!loading && !error && latest && <>
                {/* Hero — only on All tab */}
                {!activePl && (
                  <section style={{ marginBottom:80 }}>
                    <p style={{ fontSize:10, fontWeight:700, letterSpacing:"0.22em", textTransform:"uppercase", color:"#bbb", marginBottom:24 }}>Latest Episode</p>
                    <div style={{ display:"grid", gridTemplateColumns:"1.15fr 0.85fr", gap:56, alignItems:"center" }}>
                      <div style={{ aspectRatio:"16/9", overflow:"hidden", background:"#f0f0f0" }}><Thumb url={latest.thumb} id={latest.id} alt={latest.title} /></div>
                      <div>
                        <div style={{ fontSize:108, fontWeight:900, color:"#efefef", lineHeight:.85, marginBottom:20, letterSpacing:"-0.05em", userSelect:"none" }}>{latest.num}</div>
                        <h1 style={{ fontSize:24, fontWeight:800, lineHeight:1.25, marginBottom:10 }}>{latest.title}</h1>
                        <p style={{ fontSize:12, color:"#bbb", marginBottom:36 }}>{latest.date}</p>
                        <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                          <button className="btn-w" onClick={() => setWatchEp(latest)} style={{ padding:"11px 26px", background:"#111", color:"#fff", fontSize:11, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase" }}>Watch</button>
                          <button className="btn-l" onClick={() => handleAudio(latest)} style={{ padding:"11px 26px", border:"1px solid #ddd", fontSize:11, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase" }}>{audioEp?.id === latest.id && playing ? "⏸ Pause" : "♪ Listen"}</button>
                        </div>
                      </div>
                    </div>
                  </section>
                )}

                {/* Random set button */}
                <div style={{ margin:"0 0 56px", display:"flex", justifyContent:"center" }}>
                  <button onClick={() => {
                    const pool = allVideos.filter(v => v.id !== audioEp?.id);
                    const pick = pool[Math.floor(Math.random() * pool.length)];
                    if (pick) loadAudio(pick);
                  }}
                  style={{ display:"flex", alignItems:"center", gap:12, padding:"16px 32px", border:"1px solid #e0e0e0", background:"#fafafa", fontSize:12, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", cursor:"pointer", transition:"all .15s" }}
                  onMouseEnter={e => { e.currentTarget.style.background="#111"; e.currentTarget.style.color="#fff"; e.currentTarget.style.borderColor="#111"; }}
                  onMouseLeave={e => { e.currentTarget.style.background="#fafafa"; e.currentTarget.style.color="#111"; e.currentTarget.style.borderColor="#e0e0e0"; }}>
                    <span style={{ fontSize:18 }}>⟳</span> I'm bored — play me a random set
                  </button>
                </div>

                <div style={{ borderTop:"1px solid #ebebeb", marginBottom:0 }} />

                {/* Playlist tabs */}
                <div style={{ display:"flex", gap:0, overflowX:"auto", borderBottom:"1px solid #ebebeb", marginBottom:48 }}>
                  {[{ id:null, title:"All" }, ...playlists].map(pl => (
                    <button key={pl.id||"all"} className="pl-tab" onClick={() => handlePlTab(pl.id)}
                      style={{ flexShrink:0, padding:"18px 20px", fontSize:11, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", color: activePl===pl.id ? "#111":"#bbb", borderBottom: activePl===pl.id ? "2px solid #111":"2px solid transparent", marginBottom:"-1px", transition:"color .15s" }}>
                      {pl.title}
                    </button>
                  ))}
                </div>

                {/* Loading playlist */}
                {plLoading && (
                  <div style={{ display:"flex", justifyContent:"center", padding:"60px 0" }}>
                    <div style={{ width:24, height:24, border:"2px solid #ebebeb", borderTopColor:"#111", borderRadius:"50%", animation:"spin 0.7s linear infinite" }} />
                  </div>
                )}

                {!plLoading && (
                  <>
                    <p style={{ fontSize:10, fontWeight:700, letterSpacing:"0.22em", textTransform:"uppercase", color:"#bbb", marginBottom:36 }}>
                      {activePl ? playlists.find(p=>p.id===activePl)?.title : `All Episodes`} — {visibleVideos.length} shows
                    </p>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"52px 28px" }}>
                      {visibleVideos.map(ep => (
                        <EpCard key={ep.id} ep={ep} onWatch={setWatchEp} onAudio={handleAudio}
                          isActive={audioEp?.id === ep.id} isPlaying={audioEp?.id === ep.id && playing} />
                      ))}
                    </div>
                  </>
                )}
              </>}
            </>}
          </main>

          {/* WATCH MODAL */}
          {watchEp && (
            <div onClick={() => setWatchEp(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.93)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <div onClick={e => e.stopPropagation()} style={{ width:"min(92vw,960px)", aspectRatio:"16/9" }}>
                <iframe src={`https://www.youtube.com/embed/${watchEp.id}?autoplay=1`} style={{ width:"100%", height:"100%", border:"none" }} allow="autoplay;fullscreen" allowFullScreen />
              </div>
              <button onClick={() => setWatchEp(null)} style={{ position:"absolute", top:18, right:24, color:"#fff", fontSize:36, opacity:.5, lineHeight:1, fontWeight:300 }}>×</button>
            </div>
          )}

          {/* AUDIO PLAYER */}
          {audioEp && (
            <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"#111", color:"#fff", zIndex:200, borderTop:"1px solid #1e1e1e" }}>
              {/* Progress bar */}
              <div className="prog-bar" onClick={handleSeek}
                style={{ height:3, background:"#2a2a2a", position:"relative", cursor:"pointer" }}>
                <div className="prog-fill" style={{ height:"100%", width:`${progress*100}%`, background:"#666", transition:"width .2s linear", position:"relative" }}>
                  <div className="prog-dot" style={{ position:"absolute", right:-4, top:"50%", transform:"translateY(-50%)", width:10, height:10, borderRadius:"50%", background:"#fff", opacity:0, transition:"opacity .15s" }} />
                </div>
              </div>
              {/* Controls row */}
              <div style={{ display:"flex", alignItems:"center", gap:16, padding:"0 32px", height:72 }}>
                <div style={{ width:42, height:42, flexShrink:0, overflow:"hidden", background:"#222" }}>
                  <Thumb url={audioEp.thumb} id={audioEp.id} alt="" />
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <p style={{ fontSize:9, color:"#555", textTransform:"uppercase", letterSpacing:"0.16em", marginBottom:2 }}>Audio Only</p>
                  <p style={{ fontSize:13, fontWeight:700, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{audioEp.title}</p>
                </div>
                {/* Time */}
                <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
                  <span style={{ fontSize:11, color:"#888", fontVariantNumeric:"tabular-nums", minWidth:40, textAlign:"right" }}>{fmt(currentTime)}</span>
                  <span style={{ fontSize:11, color:"#444" }}>/</span>
                  <span style={{ fontSize:11, color:"#555", fontVariantNumeric:"tabular-nums", minWidth:40 }}>{fmt(duration)}</span>
                </div>
                <button onClick={togglePlay}
                  style={{ width:40, height:40, borderRadius:"50%", border:"1px solid #333", color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, flexShrink:0 }}>
                  {playing ? "⏸" : "▶"}
                </button>
                <button onClick={stopAudio} style={{ color:"#444", fontSize:26, fontWeight:300, lineHeight:1, flexShrink:0 }}>×</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
